# Enable the ngx_http_htaccess dynamic module.
#
# This file is installed to /usr/share/nginx/modules-available/ but is NOT
# loaded automatically. To activate the module, add this line to the top
# (main context) of /etc/nginx/nginx.conf:
#
#     load_module modules/ngx_http_htaccess_module.so;
#
# then enable `htaccess on;` inside the relevant location/server block.
load_module modules/ngx_http_htaccess_module.so;
