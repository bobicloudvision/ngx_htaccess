name: Release packages

# Builds .deb and .rpm packages of the htaccess dynamic module for each target
# distro, against an nginx.org release (compiled --with-compat). Triggered on a
# version tag (v1.2.3) or manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      nginx_version:
        description: nginx branch to build against
        default: '1.30.2'
        required: true

env:
  NGINX_VERSION: ${{ github.event.inputs.nginx_version || '1.30.2' }}

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- Debian / Ubuntu (.deb) ---
          - { image: 'debian:11',         packager: deb }
          - { image: 'debian:12',         packager: deb }
          - { image: 'ubuntu:20.04',      packager: deb }
          - { image: 'ubuntu:22.04',      packager: deb }
          - { image: 'ubuntu:24.04',      packager: deb }
          # --- RHEL family (.rpm) ---
          - { image: 'rockylinux:8',      packager: rpm }
          - { image: 'rockylinux:9',      packager: rpm }
          # --- Fedora (.rpm) ---
          - { image: 'fedora:40',         packager: rpm }
          - { image: 'fedora:41',         packager: rpm }
    container:
      image: ${{ matrix.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive package version
        run: |
          ref='${{ github.ref_name }}'
          ver="${ref#v}"
          case "$ver" in v*|'' ) ver=0.1.0 ;; esac
          # tag like v1.2.3 -> 1.2.3 ; non-tag runs -> 0.1.0
          [ "$ref" = "$ver" ] && ver=0.1.0
          echo "PKG_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Build and package
        run: packaging/build.sh ${{ matrix.packager }}

      - name: Sanitize artifact name
        id: art
        run: echo "name=$(echo '${{ matrix.image }}' | tr '/:' '__')" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: pkg-${{ steps.art.outputs.name }}
          path: dist/*

  release:
    needs: package
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Attach packages to the GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
