name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NGINX_VERSION: 1.30.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev wget

      - name: Download nginx
        run: wget -q "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"

      - name: Build dynamic module
        run: |
          tar xzf "nginx-${NGINX_VERSION}.tar.gz"
          cd "nginx-${NGINX_VERSION}"
          ./configure --with-compat --add-dynamic-module="${GITHUB_WORKSPACE}"
          make modules
          test -f objs/ngx_http_hello_module.so

      - name: Smoke test
        run: |
          cd "nginx-${NGINX_VERSION}"
          module_path="$(pwd)/objs/ngx_http_hello_module.so"
          cat > /tmp/nginx-hello.conf <<EOF
          load_module ${module_path};
          daemon off;
          pid /tmp/nginx-hello.pid;
          events { worker_connections 32; }
          http {
            server {
              listen 18080;
              location / { hello; }
            }
          }
          EOF

          ./objs/nginx -c /tmp/nginx-hello.conf &
          nginx_pid=$!

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/ | grep -q 'Hello, World!'; then
              kill "${nginx_pid}"
              wait "${nginx_pid}" || true
              exit 0
            fi
            sleep 0.5
          done

          kill "${nginx_pid}" || true
          echo "nginx hello handler did not respond in time"
          exit 1
