name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NGINX_VERSION: 1.30.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libpcre2-dev zlib1g-dev libssl-dev wget curl libcrypt-dev

      - name: Download nginx
        run: wget -q "https://nginx.org/download/nginx-${NGINX_VERSION}.tar.gz"

      - name: Build dynamic module
        run: |
          tar xzf "nginx-${NGINX_VERSION}.tar.gz"
          cd "nginx-${NGINX_VERSION}"
          ./configure --with-compat --add-dynamic-module="${GITHUB_WORKSPACE}"
          make -j"$(nproc)"
          test -f objs/ngx_http_htaccess_module.so

      - name: Integration tests
        run: |
          chmod +x tests/integration/*.sh
          tests/integration/run.sh
          tests/integration/wordpress.sh
          tests/integration/opencart.sh
